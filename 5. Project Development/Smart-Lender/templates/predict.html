<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict - Smart-Lender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-icon">🏦</span>
                <span class="logo-text">Smart-Lender</span>
            </div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/predict" class="active">Predict</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="predict-container">
            <div class="predict-header">
                <h1>Loan Prediction</h1>
                <p>Fill in the details below to get an instant loan approval prediction</p>
            </div>

            {% if error %}
            <div class="error-message">
                <span>⚠️</span>
                <p>{{ error }}</p>
            </div>
            {% endif %}

            <form method="POST" action="/predict" class="predict-form">
                <div class="form-section">
                    <h3>Personal Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="married">Married</label>
                            <select id="married" name="married" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="dependents">Dependents</label>
                            <select id="dependents" name="dependents" required>
                                <option value="">Select</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3+">3+</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="education">Education</label>
                            <select id="education" name="education" required>
                                <option value="">Select Education</option>
                                <option value="Graduate">Graduate</option>
                                <option value="Not Graduate">Not Graduate</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="self_employed">Self Employed</label>
                            <select id="self_employed" name="self_employed" required>
                                <option value="">Select</option>
                                <option value="Yes">Yes</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="property_area">Property Area</label>
                            <select id="property_area" name="property_area" required>
                                <option value="">Select Area</option>
                                <option value="Urban">Urban</option>
                                <option value="Semiurban">Semi-Urban</option>
                                <option value="Rural">Rural</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Financial Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="applicant_income">Applicant Income ($)</label>
                            <input type="number" id="applicant_income" name="applicant_income" 
                                   placeholder="e.g., 5000" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="coapplicant_income">Co-applicant Income ($)</label>
                            <input type="number" id="coapplicant_income" name="coapplicant_income" 
                                   placeholder="e.g., 2000" min="0" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="loan_amount">Loan Amount ($)</label>
                            <input type="number" id="loan_amount" name="loan_amount" 
                                   placeholder="e.g., 150000" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="loan_term">Loan Term (months)</label>
                            <input type="number" id="loan_term" name="loan_term" 
                                   placeholder="e.g., 360" min="1" value="360" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="credit_history">Credit History</label>
                            <select id="credit_history" name="credit_history" required>
                                <option value="">Select</option>
                                <option value="1">Good (1)</option>
                                <option value="0">Bad (0)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-large">Predict Loan Status</button>
                    <button type="reset" class="btn btn-secondary">Reset Form</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart-Lender. All rights reserved.</p>
    </footer>
</body>
</html>
